---
- name: Uninstall RHACM
  block:
    - name: DESTRUCTIVE ACTION WARNING
      ansible.builtin.pause:
        seconds: 30
        prompt: |
          WARNING: You are about to UNINSTALL RHACM AND ALL ITS OPERANDS.
          Press Ctrl+C now to abort!

    - name: Remove the MultiClusterHub
      kubernetes.core.k8s:
        api_version: operator.open-cluster-management.io/v1
        kind: MultiClusterHub
        name: multiclusterhub
        namespace: "{{ rhacm_namespace }}"
        state: absent
        wait: false

    - name: Wait for the MultiClusterHub to be removed (~ 10-15 minutes)
      kubernetes.core.k8s_info:
        api_version: operator.open-cluster-management.io/v1
        kind: MultiClusterHub
        name: multiclusterhub
        namespace: "{{ rhacm_namespace }}"
      register: __rhacm_hub_mch
      delay: 60
      retries: 30
      until: __rhacm_hub_mch.resources | length == 0

    - name: Remove the Subscription
      kubernetes.core.k8s:
        api_version: operators.coreos.com/v1alpha1
        kind: Subscription
        name: rhacm-operator
        namespace: "{{ rhacm_namespace }}"
        state: absent

    - name: Remove the OperatorGroup
      kubernetes.core.k8s:
        api_version: operators.coreos.com/v1
        kind: OperatorGroup
        name: rhacm-operatorgroup
        namespace: "{{ rhacm_namespace }}"
        state: absent

    - name: Remove Namespaces
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ item }}"
        state: absent
        wait: true
        wait_timeout: 240
      loop: "{{ rhacm_namespaces_to_delete }}"
      loop_control:
        label: "{{ item }}"

    - name: Get all CRDs
      kubernetes.core.k8s_info:
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
      register: __all_crds

    - name: Delete leftover RHACM CRDs
      kubernetes.core.k8s:
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: "{{ item.metadata.name }}"
        state: absent
      loop: >-
        {{
          __all_crds.resources
          | selectattr('metadata.name', 'search', 'open-cluster-management\.io|hive.*\.openshift\.io|hypershift\.openshift\.io')
          | list
        }}
      loop_control:
        label: "{{ item.metadata.name }}"
...
